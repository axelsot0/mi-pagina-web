<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telefono 3D Arcoiris</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      perspective: 1200px;
    }

    .scene {
      transform-style: preserve-3d;
      animation: sceneRotate 10s infinite linear;
    }

    .phone-3d {
      position: relative;
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      transform-style: preserve-3d;
      animation: floatText 3s ease-in-out infinite;
    }

    .layer {
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
      background: linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      animation: rainbowMove 4s linear infinite;
    }

    .layer:nth-child(1)  { transform: translateZ(-40px); opacity: 0.08; filter: blur(2px); }
    .layer:nth-child(2)  { transform: translateZ(-35px); opacity: 0.10; }
    .layer:nth-child(3)  { transform: translateZ(-30px); opacity: 0.12; }
    .layer:nth-child(4)  { transform: translateZ(-25px); opacity: 0.14; }
    .layer:nth-child(5)  { transform: translateZ(-20px); opacity: 0.16; }
    .layer:nth-child(6)  { transform: translateZ(-15px); opacity: 0.18; }
    .layer:nth-child(7)  { transform: translateZ(-10px); opacity: 0.20; }
    .layer:nth-child(8)  { transform: translateZ(-5px);  opacity: 0.25; }
    .layer:nth-child(9)  { transform: translateZ(0px);   opacity: 1; text-shadow: 0 0 8px rgba(255,255,255,0.15), 0 0 20px rgba(255,255,255,0.08); }
    .layer:nth-child(10) { transform: translateZ(5px);   opacity: 0.9; }
    .layer:nth-child(11) { transform: translateZ(10px);  opacity: 0.7; }
    .layer:nth-child(12) { transform: translateZ(15px);  opacity: 0.5; }
    .layer:nth-child(13) { transform: translateZ(20px);  opacity: 0.35; }
    .layer:nth-child(14) { transform: translateZ(25px);  opacity: 0.2; }
    .layer:nth-child(15) { transform: translateZ(30px);  opacity: 0.1; filter: blur(1px); }

    .glow {
      position: absolute;
      inset: -40px;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.04) 35%, transparent 70%);
      filter: blur(35px);
      transform: translateZ(-60px);
      animation: pulseGlow 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes rainbowMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    @keyframes floatText {
      0%, 100% {
        transform: rotateX(12deg) rotateY(-18deg) translateY(0px);
      }
      50% {
        transform: rotateX(-8deg) rotateY(18deg) translateY(-12px);
      }
    }

    @keyframes sceneRotate {
      0% {
        transform: rotateY(0deg);
      }
      100% {
        transform: rotateY(360deg);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.7;
        transform: translateZ(-60px) scale(1);
      }
      50% {
        opacity: 1;
        transform: translateZ(-60px) scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="phone-3d">
      <div class="glow"></div>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
      <span class="layer">+1(809)-752-5036</span>
    </div>
  </div>
</body>
</html>
